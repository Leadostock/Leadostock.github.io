# Локальное окружение для разработки: PostgreSQL + Redis.
# Запуск:  docker compose up -d
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lidostok
      POSTGRES_PASSWORD: lidostok
      POSTGRES_DB: lidostok
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
